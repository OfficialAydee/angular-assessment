<div class="container-fluid">
    <div class="mb-4">
        <a [routerLink]="['/backoffice/companies', companyId]" class="text-decoration-none">
            ← Terug
        </a>

        <h1 class="h3 mt-3 mb-1">Nieuwe vacature</h1>
        <p class="text-muted mb-0">
            Maak een nieuwe vacature aan voor dit bedrijf.
        </p>
    </div>

    <div class="card border-0">
        <div class="card-body p-4">
            <app-vacancy-form submitLabel="Vacature opslaan" [showActiveField]="true" (formSubmit)="createVacancy($event)" (cancel)="cancel()" />
        </div>
    </div>
</div>
