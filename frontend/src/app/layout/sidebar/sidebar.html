<aside class="sidebar" [class.sidebar--collapsed]="isCollapsed()">
    <div class="sidebar__top">
        <div class="sidebar__brand">
            <div class="sidebar__logo">V</div>

            @if (!isCollapsed()) {
            <div>
                <h1>Vacaturepunt</h1>
                <p>JEX Assessment</p>
            </div>
            }
        </div>

        <button class="sidebar__toggle" type="button" (click)="toggleSidebar()">
            {{ isCollapsed() ? '→' : '←' }}
        </button>
    </div>

    <nav class="sidebar__nav">
        @if (!isCollapsed()) {
        <span class="sidebar__section">Public</span>
        }

        <a routerLink="/jobs" routerLinkActive="active" class="sidebar__link" title="Jobs">
            <span class="sidebar__icon">◦</span>

            @if (!isCollapsed()) {
            <span>Jobs</span>
            }
        </a>

        @if (!isCollapsed()) {
        <span class="sidebar__section mt-4">Backoffice</span>
        }

        <a routerLink="/backoffice/companies" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" class="sidebar__link" title="Companies">
            <span class="sidebar__icon">◦</span>

            @if (!isCollapsed()) {
            <span>Companies</span>
            }
        </a>
    </nav>
</aside>
