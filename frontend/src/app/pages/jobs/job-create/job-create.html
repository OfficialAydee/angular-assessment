<div class="container-fluid">
    <div class="mb-4">
        <a routerLink="/jobs" class="text-decoration-none">
            ← Terug naar vacatures
        </a>

        <h1 class="h3 mt-3 mb-1">Nieuwe vacature plaatsen</h1>
        <p class="text-muted mb-0">
            Maak een vacature aan voor jouw bedrijf.
        </p>
    </div>

    <div class="card border-0">
        <div class="card-body p-4">
            <app-vacancy-form submitLabel="Vacature plaatsen" [showActiveField]="false" (formSubmit)="createVacancy($event)" (cancel)="cancel()" />
        </div>
    </div>
</div>
