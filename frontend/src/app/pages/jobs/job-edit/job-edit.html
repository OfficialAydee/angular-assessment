<div class="container-fluid">
    <div class="mb-4">
        <a [routerLink]="['/jobs', companyId, 'vacancies', vacancyId]" class="text-decoration-none">
            ← Terug
        </a>

        <h1 class="h3 mt-3 mb-1">Vacature bewerken</h1>
        <p class="text-muted mb-0">Werk je vacature bij.</p>
    </div>

    @if (isLoading()) {
    <div class="card border-0">
        <div class="card-body p-4">
            <p class="text-muted mb-0">Vacature laden...</p>
        </div>
    </div>
    }

    @if (errorMessage()) {
    <div class="alert alert-danger">
        {{ errorMessage() }}
    </div>
    }

    @if (vacancy(); as vacancy) {
    <div class="card border-0">
        <div class="card-body p-4">
            <app-vacancy-form [vacancy]="vacancy" submitLabel="Wijzigingen opslaan" [showActiveField]="false" (formSubmit)="updateVacancy($event)" (cancel)="cancel()" />
        </div>
    </div>
    }
</div>
